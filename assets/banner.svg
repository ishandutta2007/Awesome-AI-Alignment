<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f24" />
      <stop offset="50%" stop-color="#12183a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>

    <!-- Text & Glow Effects -->
    <linearGradient id="title-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="50%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#fb7185" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Node Glow -->
    <filter id="node-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="240" rx="16" fill="url(#bg-gradient)" />
  
  <!-- Subtle Grid Pattern in background -->
  <g opacity="0.08">
    <path d="M 0,40 L 800,40 M 0,80 L 800,80 M 0,120 L 800,120 M 0,160 L 800,160 M 0,200 L 800,200" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,240 M 200,0 L 200,240 M 300,0 L 300,240 M 400,0 L 400,240 M 500,0 L 500,240 M 600,0 L 600,240 M 700,0 L 700,240" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Abstract Neural Net / Alignment Graphics -->
  <!-- Left Side: Unaligned / Chaotic Nodes (Red/Orange) -->
  <g opacity="0.6" transform="translate(40, 20)">
    <line x1="20" y1="50" x2="60" y2="120" stroke="#ef4444" stroke-width="1" opacity="0.4" />
    <line x1="60" y1="120" x2="30" y2="180" stroke="#f97316" stroke-width="1" opacity="0.4" />
    <line x1="30" y1="180" x2="90" y2="150" stroke="#ef4444" stroke-width="1" opacity="0.4" />
    <line x1="90" y1="150" x2="20" y2="50" stroke="#f97316" stroke-width="1" opacity="0.4" />
    <line x1="60" y1="120" x2="90" y2="150" stroke="#ef4444" stroke-width="1" opacity="0.4" />

    <circle cx="20" cy="50" r="5" fill="#ef4444" filter="url(#node-glow)" />
    <circle cx="60" cy="120" r="7" fill="#f97316" filter="url(#node-glow)" />
    <circle cx="30" cy="180" r="4" fill="#f97316" />
    <circle cx="90" cy="150" r="6" fill="#ef4444" filter="url(#node-glow)" />
  </g>

  <!-- Right Side: Aligned / Ordered Nodes (Violet/Purple/Indigo) -->
  <g opacity="0.75" transform="translate(640, 20)">
    <!-- Connection lines representing structured alignment -->
    <line x1="40" y1="40" x2="80" y2="80" stroke="#818cf8" stroke-width="1.5" />
    <line x1="80" y1="80" x2="40" y2="120" stroke="#a78bfa" stroke-width="1.5" />
    <line x1="40" y1="120" x2="80" y2="160" stroke="#c084fc" stroke-width="1.5" />
    <line x1="80" y1="80" x2="120" y2="100" stroke="#fb7185" stroke-width="1.5" />
    <line x1="40" y1="120" x2="120" y2="100" stroke="#818cf8" stroke-width="1.5" />

    <!-- Nodes -->
    <circle cx="40" cy="40" r="5" fill="#818cf8" />
    <circle cx="80" cy="80" r="6" fill="#a78bfa" filter="url(#node-glow)" />
    <circle cx="40" cy="120" r="5" fill="#c084fc" />
    <circle cx="80" cy="160" r="5" fill="#e879f9" />
    <circle cx="120" cy="100" r="7" fill="#fb7185" filter="url(#node-glow)" />
  </g>

  <!-- Decorative target circle in center background -->
  <circle cx="400" cy="120" r="90" fill="none" stroke="#312e81" stroke-width="1" opacity="0.3" stroke-dasharray="5,5" />
  <circle cx="400" cy="120" r="70" fill="none" stroke="#4f46e5" stroke-width="1.5" opacity="0.2" />

  <!-- Main Title -->
  <text x="400" y="115" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="38" fill="url(#title-gradient)" text-anchor="middle" letter-spacing="3" filter="url(#glow)">
    AWESOME AI ALIGNMENT
  </text>

  <!-- Subtitle -->
  <text x="400" y="155" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="14" fill="#9ca3af" text-anchor="middle" letter-spacing="1.5">
    Evolution • Variants • Types • Applications
  </text>

  <!-- Border line bottom highlight -->
  <rect x="0" y="236" width="800" height="4" fill="url(#title-gradient)" opacity="0.8" />
</svg>
